name: 'CI'

env:
  HARDHAT_VAR_MNEMONIC: 'test test test test test test test test test test test junk'

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Check out the repo'
        uses: 'actions/checkout@v4'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
          cache: 'npm'

      - name: 'Install the dependencies'
        run: 'npm ci'

      - name: 'Lint the code'
        run: 'npm run lint'

      - name: 'Check code formatting'
        run: 'npm run format:check'

      - name: 'Add lint summary'
        run: |
          echo "## Lint results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

      - name: 'Compile the contracts'
        run: 'npm run compile'

      - name: 'Create test results directory'
        run: mkdir -p test-results

      - name: 'Run tests'
        run: npm test

      - name: 'Generate test summary'
        run: |
          echo "## Test results" >> $GITHUB_STEP_SUMMARY
          if [ -d "test-results" ] && [ "$(ls -A test-results/*.json 2>/dev/null)" ]; then
            echo "✅ Tests completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "📊 Test reports generated" >> $GITHUB_STEP_SUMMARY
            echo "📁 Report files:" >> $GITHUB_STEP_SUMMARY
            ls -la test-results/*.json >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test reports found" >> $GITHUB_STEP_SUMMARY
            echo "📁 Contents of test-results directory:" >> $GITHUB_STEP_SUMMARY
            ls -la test-results/ 2>/dev/null || echo "Directory does not exist" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 'Find and upload test report'
        run: |
          # Find the latest HTML report
          LATEST_REPORT=$(ls -t test-results/mochawesome-report_*.html 2>/dev/null | head -1)
          if [ -n "$LATEST_REPORT" ]; then
            echo "Found report: $LATEST_REPORT"
            echo "REPORT_PATH=$LATEST_REPORT" >> $GITHUB_ENV
          else
            echo "No HTML report found"
            echo "REPORT_PATH=" >> $GITHUB_ENV
          fi

      - name: 'Upload test report'
        uses: 'actions/upload-artifact@v4'
        if: always() && env.REPORT_PATH != ''
        with:
          name: 'test-report'
          path: ${{ env.REPORT_PATH }}
          retention-days: 30

      - name: 'Comment PR with test results'
        if: github.event_name == 'pull_request'
        uses: 'actions/github-script@v7'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Try to read the latest test report
            try {
              const testResultsDir = './test-results';
              
              // Check if directory exists
              if (!fs.existsSync(testResultsDir)) {
                console.log('Test results directory does not exist');
                return;
              }
              
              const files = fs.readdirSync(testResultsDir);
              const jsonFiles = files.filter(file => file.endsWith('.json') && file.startsWith('mochawesome-report_'));
              
              if (jsonFiles.length > 0) {
                // Sort by filename to get the latest
                const latestJsonFile = jsonFiles.sort().pop();
                const testData = JSON.parse(fs.readFileSync(path.join(testResultsDir, latestJsonFile), 'utf8'));
                
                const stats = testData.stats;
                const comment = `## 🧪 Test Results
                
                **Summary:**
                - 📊 Total Tests: ${stats.tests}
                - ✅ Passed: ${stats.passes}
                - ❌ Failed: ${stats.failures}
                - ⏱️ Duration: ${(stats.duration / 1000).toFixed(2)}s
                - 📁 Suites: ${stats.suites}
                
                ${stats.failures > 0 ? '⚠️ Some tests failed. Please check the test reports.' : '🎉 All tests passed!'}
                
                📋 **Test Report:** Download the HTML report from the workflow artifacts to view detailed results.`;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              } else {
                console.log('No mochawesome test report files found');
              }
            } catch (error) {
              console.log('Could not read test results:', error.message);
            }
