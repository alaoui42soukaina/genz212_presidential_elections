name: 'CI'

env:
  HARDHAT_VAR_MNEMONIC: 'test test test test test test test test test test test junk'

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Check out the repo'
        uses: 'actions/checkout@v4'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
          cache: 'npm'

      - name: 'Install the dependencies'
        run: 'npm ci'

      - name: 'Lint the code'
        run: |
          if npm run lint; then
            echo "✅ Linting passed"
          else
            echo "❌ Linting failed"
            exit 1
          fi

      - name: 'Check code formatting'
        run: |
          if npm run format:check; then
            echo "✅ Code formatting check passed"
          else
            echo "❌ Code formatting check failed"
            exit 1
          fi

      - name: 'Compile the contracts'
        run: |
          if ! npm run compile; then
            echo "❌ Contract compilation failed"
            exit 1
          fi

      - name: 'Create test results directory'
        run: |
          if ! mkdir -p test-results; then
            echo "❌ Failed to create test results directory"
            exit 1
          fi

      - name: 'Run tests'
        run: |
          set -e
          MAX_RETRIES=2
          TIMEOUT=60

          for attempt in $(seq 1 $((MAX_RETRIES + 1))); do
            echo "Test attempt $attempt of $((MAX_RETRIES + 1))"
            
            if timeout $TIMEOUT npm test; then
              echo "✅ Tests passed on attempt $attempt"
              exit 0
            else
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏰ Tests timed out after ${TIMEOUT}s on attempt $attempt"
              else
                echo "❌ Tests failed with exit code $EXIT_CODE on attempt $attempt"
              fi
              
              if [ $attempt -le $MAX_RETRIES ]; then
                echo "🔄 Retrying tests in 5 seconds..."
                sleep 5
                # Clean up any partial test results
                npm run report:clean
              else
                echo "💥 All test attempts failed"
                exit $EXIT_CODE
              fi
            fi
          done


      - name: 'Generate test summary'
        if: always()
        run: |
          echo "## Test results" >> $GITHUB_STEP_SUMMARY
          
          # Check if tests passed by looking at the latest test results
          if [ -d "test-results" ] && [ "$(ls -A test-results/*.json 2>/dev/null)" ]; then
            LATEST_JSON=$(ls -t test-results/mochawesome-report_*.json 2>/dev/null | head -1)
            if [ -n "$LATEST_JSON" ]; then
              echo "🔍 For a detailed test report, check the \`test-report\` artifact below." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "📊 **Test Results:**" >> $GITHUB_STEP_SUMMARY
              
              # Extract stats and determine pass/fail status using node
              node -e "
                const fs = require('fs');
                try {
                  const testData = JSON.parse(fs.readFileSync('$LATEST_JSON', 'utf8'));
                  const stats = testData.stats;
                  
                  // Show overall test status
                  if (stats.failures === 0) {
                    console.log('✅ 🎉 **TESTS PASSED**');
                  } else {
                    console.log('😥 **TESTS FAILED**');
                  }
                  console.log('');
                  
                  // Show detailed stats
                  console.log('- Total Tests: ' + stats.tests);
                  console.log('- Passed: ' + stats.passes);
                  console.log('- Failed: ' + stats.failures);
                  console.log('- Duration: ' + (stats.duration / 1000).toFixed(2) + 's');
                  
                  if (stats.failures > 0 && testData.results && testData.results.length > 0) {
                    console.log('');
                    console.log('❌ **Failed Tests:**');
                    
                    const extractFailedTests = (suite) => {
                      if (suite.tests) {
                        suite.tests.forEach(test => {
                          if (test.state === 'failed') {
                            console.log('- \`' + test.title + '\`');
                            if (test.err && test.err.message) {
                              console.log('  - Error: ' + test.err.message);
                            }
                          }
                        });
                      }
                      if (suite.suites) {
                        suite.suites.forEach(subSuite => extractFailedTests(subSuite));
                      }
                    };
                    
                    testData.results.forEach(suite => extractFailedTests(suite));
                  } else {
                    console.log('');
                    console.log('🎉 All tests passed!');
                  }
                } catch (error) {
                  console.log('⚠️ **TESTS STATUS UNKNOWN**');
                  console.log('Could not parse test results:', error.message);
                }
              " >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ **TESTS STATUS UNKNOWN**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ **NO TEST RESULTS FOUND**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 'Find and upload test report'
        if: always()
        run: |
          # Find the latest HTML report
          LATEST_REPORT=$(ls -t test-results/mochawesome-report_*.html 2>/dev/null | head -1)
          if [ -n "$LATEST_REPORT" ]; then
            echo "📄 Found test report: $LATEST_REPORT"
            echo "REPORT_PATH=$LATEST_REPORT" >> $GITHUB_ENV
          else
            echo "❌ No HTML report found"
            echo "REPORT_PATH=" >> $GITHUB_ENV
          fi

      - name: 'Upload test report'
        uses: 'actions/upload-artifact@v4'
        if: always() && env.REPORT_PATH != ''
        with:
          name: 'test-report'
          path: ${{ env.REPORT_PATH }}
          retention-days: 30

      - name: 'Comment PR with test results'
        if: github.event_name == 'pull_request'
        uses: 'actions/github-script@v7'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Try to read the latest test report
            try {
              const testResultsDir = './test-results';
              
              // Check if directory exists
              if (!fs.existsSync(testResultsDir)) {
                console.log('Test results directory does not exist');
                return;
              }
              
              const files = fs.readdirSync(testResultsDir);
              const jsonFiles = files.filter(file => file.endsWith('.json') && file.startsWith('mochawesome-report_'));
              
              if (jsonFiles.length > 0) {
                // Sort by filename to get the latest
                const latestJsonFile = jsonFiles.sort().pop();
                const testData = JSON.parse(fs.readFileSync(path.join(testResultsDir, latestJsonFile), 'utf8'));
                
                const stats = testData.stats;
                
                // Extract failed tests
                let failedTestsList = '';
                if (stats.failures > 0 && testData.results && testData.results.length > 0) {
                  failedTestsList = '\n\n**❌ Failed Tests:**\n';
                  
                  const extractFailedTests = (suite) => {
                    if (suite.tests) {
                      suite.tests.forEach(test => {
                        if (test.state === 'failed') {
                          failedTestsList += `- \`${test.title}\`\n`;
                          if (test.err && test.err.message) {
                            failedTestsList += `  - Error: ${test.err.message}\n`;
                          }
                        }
                      });
                    }
                    if (suite.suites) {
                      suite.suites.forEach(subSuite => extractFailedTests(subSuite));
                    }
                  };
                  
                  testData.results.forEach(suite => extractFailedTests(suite));
                }
                
                const comment = `## 🧪 Test Results
                
                **Summary:**
                - 📊 Total Tests: ${stats.tests}
                - ✅ Passed: ${stats.passes}
                - ❌ Failed: ${stats.failures}
                - ⏱️ Duration: ${(stats.duration / 1000).toFixed(2)}s
                
                ${stats.failures > 0 ? '⚠️ Some tests failed. See details below.' : '🎉 All tests passed!'}${failedTestsList}
                
                📋 **Test Report:** Download the HTML report from the workflow artifacts to view detailed results.`;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              } else {
                console.log('No mochawesome test report files found');
              }
            } catch (error) {
              console.log('Could not read test results:', error.message);
            }
