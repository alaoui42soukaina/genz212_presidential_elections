name: 'CI'

env:
  HARDHAT_VAR_MNEMONIC: 'test test test test test test test test test test test junk'

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Check out the repo'
        uses: 'actions/checkout@v4'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
          cache: 'npm'

      - name: 'Install the dependencies'
        run: 'npm ci'

      - name: 'Lint the code'
        run: 'npm run lint'

      - name: 'Check code formatting'
        run: 'npm run format:check'

      - name: 'Add lint summary'
        run: |
          echo "## Lint results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

      - name: 'Compile the contracts'
        run: 'npm run compile'

      - name: 'Run unit tests'
        run: "npm run test -- --grep '@unit'"

      - name: 'Run integration tests'
        run: npx hardhat test --grep "@integration"

      - name: 'Run e2e tests'
        run: npx hardhat test --grep "@e2e"

      - name: 'Generate test coverage report'
        run: 'npm run test:coverage'

      - name: 'Generate test report'
        run: 'npm run test:report'

      - name: "Create directories if they don't exist"
        run: |
          mkdir -p test-results
          mkdir -p coverage

      - name: 'Add test summary'
        run: |
          echo "## Test results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Integration tests passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY

      - name: 'Upload test reports'
        uses: 'actions/upload-artifact@v4'
        if: always()
        with:
          name: 'test-reports'
          path: 'test-results/'
          retention-days: 30
          if-no-files-found: warn

      - name: 'Upload coverage reports'
        uses: 'actions/upload-artifact@v4'
        if: always()
        with:
          name: 'coverage-reports'
          path: 'coverage/'
          retention-days: 30
          if-no-files-found: warn

      - name: 'Comment PR with test results'
        if: github.event_name == 'pull_request'
        uses: 'actions/github-script@v7'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Try to read the latest test report
            try {
              const testResultsDir = './test-results';
              const files = fs.readdirSync(testResultsDir);
              const jsonFiles = files.filter(file => file.endsWith('.json'));
              
              if (jsonFiles.length > 0) {
                const latestJsonFile = jsonFiles.sort().pop();
                const testData = JSON.parse(fs.readFileSync(path.join(testResultsDir, latestJsonFile), 'utf8'));
                
                const stats = testData.stats;
                const comment = `## 🧪 Test Results
                
                **Summary:**
                - ✅ Tests: ${stats.tests}
                - ✅ Passed: ${stats.passes}
                - ❌ Failed: ${stats.failures}
                - ⏱️ Duration: ${stats.duration}ms
                
                **Coverage:** Check the coverage reports in the artifacts section.
                
                ${stats.failures > 0 ? '⚠️ Some tests failed. Please check the test reports.' : '🎉 All tests passed!'}`;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('Could not read test results:', error.message);
            }
